version: 2

project_name: anchorbrowser

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: anchorbrowser
    binary: anchorbrowser
    main: ./cmd/anchorbrowser
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: anchorbrowser
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

brews:
  - name: anchorbrowser
    ids:
      - anchorbrowser
    repository:
      owner: anchorbrowser
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://anchorbrowser.io
    description: AnchorBrowser CLI for sessions, tasks, and identities
    license: MIT
    install: |
      bin.install "anchorbrowser"
      system "#{bin}/anchorbrowser", "proxy", "--help"
      generate_completions_from_executable(bin/"anchorbrowser", "__completion")
    test: |
      system "#{bin}/anchorbrowser", "version"

release:
  github:
    owner: anchorbrowser
    name: cli
