name: dependency-review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        id: depreview
        uses: actions/dependency-review-action@v4
        continue-on-error: true

      - name: Dependency review fallback (when dependency graph is unavailable)
        if: steps.depreview.outcome == 'failure'
        run: |
          echo "Dependency review is unavailable for this repository configuration."
          echo "Using PR vulncheck gate as fallback."
