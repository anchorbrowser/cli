name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate
        run: make generate

      - name: Check formatting
        run: |
          make fmt
          git diff --exit-code

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Race test
        run: make test-race

      - name: Vulncheck
        run: make vulncheck

      - name: Build
        run: make build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate npm package
        run: npm pack --dry-run
